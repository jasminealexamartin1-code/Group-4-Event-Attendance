<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Events — EvenTrack</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/events.css"/>
</head>
<body>
  <div id="navbar"></div>

  <main>
    <!-- Hero -->
    <section class="page-hero">
      <div class="container">
        <span class="section-label label-violet">DISCOVER EVENTS</span>
        <h1>Explore <span class="gradient-text">Upcoming Events</span></h1>
        <p>Find the perfect event for you. Filter by category, type, and availability.</p>
      </div>
    </section>

    <!-- Filters -->
    <div class="filters-bar">
      <div class="container filters-inner">
        <div class="filter-label">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
          </svg>
          Filters:
        </div>
        <div class="filter-group" id="category-filters"></div>
        <div class="filter-sep"></div>
        <div class="filter-group" id="type-filters"></div>
      </div>
    </div>

    <!-- Events Grid -->
    <section style="padding:48px 0 72px">
      <div class="container">
        <div id="events-grid" class="events-grid"></div>
        <div id="no-events" class="no-events" style="display:none">
          <div class="no-icon">🔍</div>
          <h3>No Events Found</h3>
          <p>Try adjusting your filters to see more results.</p>
        </div>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="js/data.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/main.js"></script>
  <script src="js/events.js"></script>
</body>
</html>
